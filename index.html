<html>
    <head>
        <meta charset="UTF-8">
        <title>
            Packing list
        </title>
        <link rel="stylesheet" href="./style.css">
    </head>
    <body>
        <h1>Packing list</h1>
        <p>Pack your items according..</p>
        <form action="/options" method="post" id="form1">
            <div id="form1">
                <h2>Where are you staying?</h2>
                <input type="checkbox" value="Different Country" required>
                <label for="Different country">Different Country</label>
                <input type="checkbox" value="Different city in my country">
                <label for="Different city in my country">Different city in my country</label>
                <button class="next">Next</button>
            </div>
            <div id="form2">
                <input type="checkbox" value="Hotel" required>
                <label for="Hotel">Hotel</label>
                <input type="checkbox" value="Hostel" required>
                <label for="Hostel">Hostel</label>
                <input type="checkbox" value="Short term rental" required>
                <label for="Short term rental">Short term rental</label>
                <input type="checkbox" value="Friend's house" required>
                <label for="Friend's house">Friend's house</label>
                <input type="checkbox" value="Camping" required>
                <label for="Camping">Camping</label>
            </div>
            <!--<div id="form3">
            </div>-->
        <button type="submit" id="submit">Done</button>
        </form>
        <script src="index.js"></script>
    </body>
</html>
