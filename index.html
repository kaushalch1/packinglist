<html>
    <head>
        <meta charset="UTF-8">
        <title>
            Packing list
        </title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
        <link rel="stylesheet" href="./style.css">
    </head>
    <body>
        <h1>Packing list</h1>
            <form action="/options" method="post" id="packingForm">
            <div id="step1" class="form">
                <h2>Where are you travelling to?</h2>
                <label>
                    <input type="radio" name="travel" class="checkbox" value="Different Country">Different Country
                </label><br>
                <label>
                    <input type="radio" name="travel" class="checkbox" value="Different city in my country">Different city in my country
                </label>
                <input type="hidden" name="travelNext" value="next"><br>
                <button class="next" type="button" onclick="validateform(event)">Next</button>
            </div>
            <div id="step2" class="form">
                <h2>Where are you staying?</h2>
                <label>
                    <input type="checkbox" name="Hotel" class="checkbox" value="Hotel">Hotel
                </label><br>
                <label>
                    <input type="checkbox" name="Hostel" class="checkbox" value="Hostel">Hostel
                </label><br>
                <label>
                    <input type="checkbox" name="Friend's house" class="checkbox" value="Friend's house">Friend's house
                </label><br>
                <label>
                    <input type="checkbox" name="Camping" class="checkbox" value="Camping">Camping
                </label>
                <input type="hidden" name="stayNext" value="next"><br>
                <button class="previous" type="button" onclick="prevform(event)">Previous</button>
                <button class="next" type="button" onclick="validateform(event)">Next</button>
            </div>
            <div id="step3" class="form">
                <h2>What's the weather expected to like?</h2>
                <label>
                    <input type="checkbox" name="Freezing" class="checkbox" value="Freezing">Freezing
                </label><br>
                <label>
                    <input type="checkbox" name="Cold" class="checkbox" value="Cold">Cold
                </label><br>
                <label>
                    <input type="checkbox" name="Warm" class="checkbox" value="Warm">Warm
                </label><br>
                <label>
                    <input type="checkbox" name="Hot" class="checkbox" value="Hot">Hot
                </label><br>
                <label>
                    <input type="checkbox" name="Rainy" class="checkbox" value="Rainy">Rainy
                </label>
                <input type="hidden" name="weatherNext" value="next"><br>
                <button class="previous" type="button" onclick="prevform(event)">Previous</button>
                <button class="next" type="button" onclick="validateform(event)">Next</button>
            </div>
            <div id="step4" class="form">
                <h2>Reason for travelling?</h2>
                <label>
                    <input type="radio" name="reason" value="Vacation" class="checkbox">Vacation
                </label><br>
                <label>
                    <input type="radio" name="reason" value="Business/study" class="checkbox">Business/study
                </label><br>
                <label>
                    <input type="radio" name="reason" value="Destination wedding" class="checkbox">Destination wedding
                </label><br>
                <label>
                    <input type="radio" name="reason" value="Concert/Festival" class="checkbox">Concert/Festival
                </label>
                <input type="hidden" name="reasonNext" value="next"><br>
                <button class="previous" type="button" onclick="prevform(event)">Previous</button>
                <button type="button" class="next" onclick="validateform(event)">Next</button>
            </div>
            <div id="step5" class="form">
                <h2>Pack items for?</h2>
                <label>
                    <input type="checkbox" name="Female" class="checkbox" value="Female">Female
                </label><br>
                <label>
                    <input type="checkbox" name="Male" class="checkbox" value="Male">Male
                </label><br>
                <label>
                    <input type="checkbox" name="Baby" class="checkbox" value="Baby">Baby
                </label>
                <input type="hidden" name="genderNext" value="next"><br>
                <button class="previous" type="button" onclick="prevform(event)">Previous</button>
                <button class="next" type="button" onclick="validateform(event)">Next</button>
            </div>
            <div id="step6" class="form">
                <h2>Are you taking...</h2>
                <label>
                    <input type="checkbox" name="Laptop" class="checkbox" value="Laptop">Laptop
                </label><br>
                <label>
                    <input type="checkbox" name="Tablet" class="checkbox" value="Tablet">Tablet
                </label><br>
                <label>
                    <input type="checkbox" name="Camera" class="checkbox" value="Camera">Camera
                </label><br>
                <label>
                    <input type="checkbox" name="E-reader" class="checkbox" value="E-reader">E-reader
                </label><br>
                <label>
                    <input type="checkbox" name="Smart watch" class="checkbox" value="Smart watch">Smart watch
                </label>
                <input type="hidden" name="electronicsNext" value="next"><br>
                <button class="previous" type="button" onclick="prevform(event)">Previous</button>
                <button class="next" type="button" onclick="validateform(event)">Next</button>
            </div>
            <div id="step7" class="form">
                <h2>Are you going swimming?</h2>
                <label>
                    <input type="radio" name="swim" class="checkbox" value="Yes">Yes
                </label><br>
                <label>
                    <input type="radio" name="swim" class="checkbox" value="No">No
                </label>
                <input type="hidden" name="swimNext" value="next"><br>
                <button class="previous" type="button" onclick="prevform(event)">Previous</button>
                <button class="next" type="button" onclick="validateform(event)">Next</button>
            </div>
            <div id="step8" class="form">
                <h2>What about sports or outdoor activities?</h2>
                <label>
                    <input type="radio" name="outdoor" class="checkbox" value="Yes">Yes
                </label><br>
                <label>
                    <input type="radio" name="outdoor" class="checkbox" value="No">No
                </label>
                <input type="hidden" name="outdoorNext" value="next"><br>
                <button class="previous" type="button" onclick="prevform(event)">Previous</button>
                <button type="submit" id="submit" class="done" >Done</button>
            </div>
            <div id="step9" class="form">
                <!-- <button onclick="window.print()"><i class="fa-solid fa-print" style="color: rgb(99, 230, 190);"></i></button> -->
            </div>
        </form>
        <script src="index.js"></script>
    </body>
</html>
